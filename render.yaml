services:
  - type: web
    name: hytrade-backend
    runtime: node
    rootDir: backend
    branch: main
    buildCommand: npm ci || npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        fromDatabase:
          name: hytrade-mongodb
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: MARKET_DATA_PROVIDER
        value: finnhub
      - key: MARKET_DATA_API_KEY
        sync: false
      - key: STARTING_BALANCE_INR
        value: "100000"
    plan: free
    autoDeploy: true
